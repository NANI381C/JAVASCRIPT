<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center><h1>Sign-up page</h1></center>

    <center>
        <input type="text" placeholder="Enter username" id="a"><br>
        <input type="email" placeholder="Enter email" id="b"><br>
        <input type="password" placeholder="Enter password" id="c"><br>
        <button onclick="signup()">Sign-up</button>
    </center>
    <script>
        function signup(){
            let username = document.getElementById("a").value
            let Email = document.getElementById("b").value
            let password = document.getElementById("c").value

            localStorage.setItem("username",username)
            localStorage.setItem("Email",Email)
            localStorage.setItem("password",password)
            alert("Data Saved....!")
            window.location.href = "login.html"
        }
    </script>
</body>
</html>
